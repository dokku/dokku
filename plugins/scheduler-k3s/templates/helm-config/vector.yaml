---
role: Agent

tolerations:
  - effect: NoSchedule
    key: node-role.kubernetes.io/master
    operator: Exists
  - effect: NoSchedule
    key: node-role.kubernetes.io/control-plane
    operator: Exists
  - effect: NoSchedule
    key: node-role.kubernetes.io/infra
    operator: Exists

service:
  ports:
    - name: prom-exporter
      port: 9090
      protocol: TCP
      targetPort: 9090

livenessProbe:
  httpGet:
    path: /health
    port: api
readinessProbe:
  httpGet:
    path: /health
    port: api

# Replace the chart's defaults so /vector-data-dir is backed by a host directory
# instead of the chart-managed emptyDir. Other defaults (var-log, var-lib, procfs,
# sysfs) are preserved as the chart ships them.
defaultVolumes:
  - name: data
    hostPath:
      path: /var/lib/vector
      type: DirectoryOrCreate
  - name: var-log
    hostPath:
      path: /var/log/
  - name: var-lib
    hostPath:
      path: /var/lib/
  - name: procfs
    hostPath:
      path: /proc
  - name: sysfs
    hostPath:
      path: /sys

defaultVolumeMounts:
  - name: data
    mountPath: /vector-data-dir
    readOnly: false
  - name: var-log
    mountPath: /var/log/
    readOnly: true
  - name: var-lib
    mountPath: /var/lib
    readOnly: true
  - name: procfs
    mountPath: /host/proc
    readOnly: true
  - name: sysfs
    mountPath: /host/sys
    readOnly: true

customConfig:
  data_dir: /vector-data-dir

  api:
    enabled: true
    address: 0.0.0.0:8686
    playground: false

  sources:
    kubernetes_logs:
      type: kubernetes_logs

    internal_metrics:
      type: internal_metrics

  transforms:
    kubernetes_container_logs:
      type: remap
      inputs:
        - kubernetes_logs
      source: |
        .container = .kubernetes.container_name
        .pod       = .kubernetes.pod_name
        .namespace = .kubernetes.pod_namespace

  sinks:
    default_global_sink:
      type: console
      inputs:
        - kubernetes_container_logs
      encoding:
        codec: json

    prom_exporter:
      type: prometheus_exporter
      inputs:
        - internal_metrics
      address: 0.0.0.0:9090
